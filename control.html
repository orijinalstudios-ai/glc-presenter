<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src 'self' data:;">
    <title>Operator Control Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1e1e1e; color: white; display: flex; padding: 20px; gap: 20px; }
        .panel { background-color: #2d2d2d; padding: 20px; border-radius: 8px; flex: 1; }
        .song-btn { display: block; width: 100%; padding: 10px; margin-bottom: 10px; background-color: #444; color: white; border: none; cursor: pointer; text-align: left; font-size: 16px; border-radius: 4px; }
        .song-btn:hover { background-color: #555; }
        .control-btn { padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; width: 100%; margin-top: 10px;}
        .control-btn:hover { background-color: #0056b3; }
        .clear-btn { background-color: #dc3545; }
        .clear-btn:hover { background-color: #c82333; }
        #preview-text { background: black; padding: 15px; border-radius: 5px; min-height: 50px; text-align: center; font-style: italic; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>Song Library</h2>
        <div id="song-list">
            </div>
    </div>
<div class="panel">
        <h2>Media Library</h2>
        <p>Click to change projector background.</p>
        
        <div id="media-list"></div>
        
        <button class="song-btn" style="background-color: black; border: 1px solid white; margin-top: 15px;" onclick="changeBackground('')">Black Screen</button>
    </div>
    <div class="panel" style="flex: 2;"> <h2 id="current-song-title">No Song Selected</h2>
        
        <div id="lyrics-grid"></div>
        
        <button class="control-btn clear-btn" onclick="clearScreen()">Clear Screen ✖</button>
    </div>

    <script>
        // THE DATABASE: An Array of Objects
        // We start with an empty database
        let database = [];
        let activeLyrics = [];
        let currentSlideIndex = 0;

        // NEW: Ask the backend for the data when the app opens!
        async function startApp() {
            // Wait for the walkie-talkie to bring the data back
            database = await window.api.loadDatabase();
            
            // Now that we have the data, build the buttons
            loadLibrary(); 
        }

        // 1. Build the Song Library Buttons
        function loadLibrary() {
            // ... (keep your existing loadLibrary code here)
        }

        // 1. Build the Song Library Buttons when the app opens
        function loadLibrary() {
            const listDiv = document.getElementById("song-list");
            for (let i = 0; i < database.length; i++) {
                let btn = document.createElement("button");
                btn.className = "song-btn";
                btn.innerText = database[i].title;
                // When clicked, load this specific song
                btn.onclick = function() { loadSong(i); }; 
                listDiv.appendChild(btn);
            }
        }

// 2. Load a song and generate the grid!
        function loadSong(index) {
            let song = database[index];
            document.getElementById("current-song-title").innerText = song.title;
            activeLyrics = song.lyrics;
            
            const gridDiv = document.getElementById("lyrics-grid");
            gridDiv.innerHTML = ""; // Clear out the old song's grid

            // Loop through every lyric and make a button
            for (let i = 0; i < activeLyrics.length; i++) {
                let btn = document.createElement("button");
                btn.className = "song-btn lyric-item";
                // If it's an empty string, label it clearly
                btn.innerText = activeLyrics[i] === "" ? "(Blank Slide)" : activeLyrics[i];
                
                // When clicked, fire this specific lyric!
                btn.onclick = function() { fireLyric(i); }; 
                
                // Give it an ID so we can find it later to highlight it
                btn.id = "slide-" + i; 
                
                gridDiv.appendChild(btn);
            }
        }

        // 3. The Non-Linear Firing Mechanism
        function fireLyric(index) {
            // Send the exact text to the projector
            window.api.sendLyric(activeLyrics[index]); 
            
            // Remove the 'live' highlight from all buttons
            let allBtns = document.getElementsByClassName("lyric-item");
            for (let i = 0; i < allBtns.length; i++) {
                allBtns[i].classList.remove("live");
            }

            // Add the 'live' highlight to the one we just clicked!
            document.getElementById("slide-" + index).classList.add("live");
        }

        // 5. Emergency Clear Screen Button
        function clearScreen() {
            window.api.sendLyric(""); // Sending an empty text clears the projector
        }
// 6. Send the new background image to the Projector
        function changeBackground(mediaPath) {
            window.api.sendMedia(mediaPath);
        }

async function startApp() {
    try {
        // 1. Load Songs
        database = await window.api.loadDatabase();
        loadLibrary(); 
        console.log("Songs loaded successfully");

        // 2. Load Media
        const mediaFiles = await window.api.getMediaFiles();
        loadMediaLibrary(mediaFiles);
        console.log("Media loaded successfully");
    } catch (error) {
        console.error("The bridge failed:", error);
    }
}
    </script>
</body>
</html>
