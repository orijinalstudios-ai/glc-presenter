<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src 'self' data:;">
    <title>Projector Output</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Layer 1: The Media Background Container */
        #media-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* This magical negative number forces it behind the text */
            background-color: black;
            overflow: hidden;
        }

        /* Make sure both images and videos fill the whole screen perfectly */
        #media-layer img, #media-layer video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }
    </style>
</head>
<body class="projector-mode">
    
   <div id="media-layer"></div>

    <h1 id="screen-text"></h1>

    <script>
        // 1. Listen for Lyrics (No changes here)
        window.api.onLyricUpdate((lyric) => {
            document.getElementById("screen-text").innerText = lyric;
        });

 // 2. NEW: The Smart Media Listener (UNIVERSAL FIX)
        window.api.onMediaUpdate((mediaPath) => {
            const mediaLayer = document.getElementById("media-layer");

            if (mediaPath === "") {
                mediaLayer.innerHTML = ""; 
                
            } else if (mediaPath.endsWith(".mp4")) {
                mediaLayer.innerHTML = `<video src="./media/${mediaPath}" autoplay loop muted></video>`;
            } else {
                mediaLayer.innerHTML = `<img src="./media/${mediaPath}">`;
            }
        });
    </script>
</body>
</html>
